services:
  app:
    build: .
    network_mode: host
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/pomhub.db
      - HOST=0.0.0.0
      - PORT=4321
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4321/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
