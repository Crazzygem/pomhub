services:
  app:
    build: .
    network_mode: host
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/pomhub.db
      - HOST=0.0.0.0
      - PORT=4321
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4321/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
